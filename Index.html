<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Core Math Matrix</title>
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #18181b;
            --border: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #71717a;
            --accent: #3f3f46;
            --accent-bright: #ffffff;
            --success: #22c55e;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .screen {
            display: none;
            flex-direction: column;
            flex: 1;
            padding: 24px;
            justify-content: center;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 32px;
            text-align: center;
        }

        /* Login Screen UI */
        .input-flat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            margin-bottom: 24px;
        }

        .btn-action {
            background: var(--text-main);
            color: var(--bg-dark);
            border: none;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Geometric Selector Grid */
        .matrix-container {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 4px;
            width: 100%;
            aspect-ratio: 1;
            margin-bottom: 32px;
        }

        .matrix-cell {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
        }

        .matrix-cell.highlighted {
            background: var(--accent);
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        .matrix-cell.max-bound {
            background: var(--text-main);
            color: var(--bg-dark);
            border-color: var(--text-main);
        }

        /* Arena Layout */
        .arena-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 24px;
            left: 0;
            padding: 0 24px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .arena-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .math-expr {
            font-size: 4.5rem;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }

        .math-input-box {
            min-width: 140px;
            height: 64px;
            border-bottom: 3px solid var(--border);
            font-size: 3rem;
            font-weight: 600;
            text-align: center;
            line-height: 64px;
            color: var(--text-main);
            margin-bottom: 16px;
        }

        .math-input-box.correct {
            color: var(--success);
            border-bottom-color: var(--success);
        }

        .math-input-box.incorrect {
            color: var(--error);
            border-bottom-color: var(--error);
        }

        .arena-feedback {
            font-size: 1rem;
            min-height: 24px;
            color: var(--text-muted);
            text-align: center;
        }

        /* Touch Keyboard */
        .numpad-box {
            width: 100%;
            background: var(--bg-dark);
            border-top: 1px solid var(--border);
            padding: 16px 24px calc(16px + env(safe-area-inset-bottom)) 24px;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 400px;
            margin: 0 auto;
        }

        .key {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 12px;
            font-size: 1.8rem;
            font-weight: 500;
            padding: 14px 0;
            text-align: center;
            cursor: pointer;
            touch-action: manipulation;
        }

        .key:active {
            background: var(--accent);
        }

        .key.clear {
            color: var(--error);
        }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <h2 id="greeting-title">Welcome</h2>
        <div class="subtitle">Enter your identifier to start training session.</div>
        <input type="text" id="username" class="input-flat" placeholder="Name / Identifier" autocomplete="off" autocorrect="off">
        <button class="btn-action" onclick="handleLogin()">Establish Session</button>
    </div>

    <div id="screen-selector" class="screen">
        <h2>Matrix Boundary Selector</h2>
        <div class="subtitle" id="selector-subtitle">Tap a intersection cell to target your training envelope.</div>
        
        <div class="matrix-container" id="matrix-grid"></div>

        <button class="btn-action" onclick="startTraining()">Initialize Core Training</button>
    </div>

    <div id="screen-arena" class="screen">
        <div class="arena-header">
            <span id="user-tag">Operator: --</span>
            <span id="session-streak">Streak: 0</span>
        </div>

        <div class="arena-display">
            <div class="math-expr" id="challenge-expr">-- × --</div>
            <div class="math-input-box" id="challenge-input"></div>
            <div class="arena-feedback" id="challenge-feedback"></div>
        </div>

        <div class="numpad-box">
            <div class="numpad-grid">
                <div class="key" data-key="1">1</div>
                <div class="key" data-key="2">2</div>
                <div class="key" data-key="3">3</div>
                <div class="key" data-key="4">4</div>
                <div class="key" data-key="5">5</div>
                <div class="key" data-key="6">6</div>
                <div class="key" data-key="7">7</div>
                <div class="key" data-key="8">8</div>
                <div class="key" data-key="9">9</div>
                <div class="key clear" data-key="C">C</div>
                <div class="key" data-key="0">0</div>
                <div class="key" style="visibility: hidden;"></div>
            </div>
        </div>
    </div>

    <script>
        // App State Engine
        let state = {
            user: "Operator",
            maxFactorX: 12,
            maxFactorY: 12,
            currentPool: [],
            activeItem: null,
            inputBuffer: "",
            streak: 0,
            inputLocked: false
        };

        // Screen Routing
        function setScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Screen 1: Login
        function handleLogin() {
            const nameInput = document.getElementById('username').value.trim();
            if (nameInput) state.user = nameInput;
            buildGeometricMatrix();
            setScreen('screen-selector');
        }

        // Screen 2: Geometric Grid Generation
        function buildGeometricMatrix() {
            const container = document.getElementById('matrix-grid');
            container.innerHTML = "";
            
            // Build 2 to 12 Matrix (11x11 Grid system)
            for (let r = 2; r <= 12; r++) {
                for (let c = 2; c <= 12; c++) {
                    const cell = document.createElement('div');
                    cell.className = "matrix-cell";
                    cell.innerText = `${r}×${c}`;
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    cell.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        updateMatrixSelection(r, c);
                    });
                    cell.addEventListener('click', () => updateMatrixSelection(r, c));
                    
                    container.appendChild(cell);
                }
            }
            updateMatrixSelection(12, 12); // Default bounding shape
        }

        function updateMatrixSelection(maxR, maxC) {
            state.maxFactorX = maxR;
            state.maxFactorY = maxC;
            
            document.getElementById('selector-subtitle').innerText = `Target Envelope: 2×2 up to ${maxR}×${maxC}`;

            document.querySelectorAll('.matrix-cell').forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                
                cell.className = "matrix-cell";
                if (r <= maxR && c <= maxC) {
                    cell.classList.add('highlighted');
                }
                if (r === maxR && c === maxC) {
                    cell.classList.add('max-bound');
                }
            });
        }

        // Screen 3: Core Training Logic
        function startTraining() {
            state.currentPool = [];
            
            // Fill session pool based on geometric constraints
            for (let i = 2; i <= state.maxFactorX; i++) {
                for (let j = 2; j <= state.maxFactorY; j++) {
                    state.currentPool.push({ x: i, y: j, ans: i * j });
                }
            }
            
            document.getElementById('user-tag').innerText = `Operator: ${state.user}`;
            setupTouchKeys();
            setScreen('screen-arena');
            serveChallenge();
        }

        function serveChallenge() {
            if (state.currentPool.length === 0) {
                // If the entire structural selection is cleared, refresh pool
                startTraining();
                return;
            }

            // Interleaved randomization loop
            const randomIndex = Math.floor(Math.random() * state.currentPool.length);
            state.activeItem = state.currentPool[randomIndex];
            
            // Remove item from active pool stack to ensure variant interleaving
            state.currentPool.splice(randomIndex, 1);

            document.getElementById('challenge-expr').innerText = `${state.activeItem.x} × ${state.activeItem.y}`;
            state.inputBuffer = "";
            state.inputLocked = false;
            
            const inputDisplay = document.getElementById('challenge-input');
            inputDisplay.innerText = "";
            inputDisplay.className = "math-input-box";
            document.getElementById('challenge-feedback').innerText = "";
        }

        // Zero-Latency Mobile Input Interceptor
        function setupTouchKeys() {
            document.querySelectorAll('.key').forEach(keyButton => {
                // Remove previous listeners to avoid binding duplication
                keyButton.onget = null; 
                
                const handler = (e) => {
                    e.preventDefault();
                    if (state.inputLocked) return;
                    
                    const value = keyButton.getAttribute('data-key');
                    handleInputSignaling(value);
                };

                keyButton.addEventListener('touchstart', handler, { passive: false });
                keyButton.addEventListener('click', handler);
            });
        }

        function handleInputSignaling(value) {
            const inputDisplay = document.getElementById('challenge-input');
            const targetLength = state.activeItem.ans.toString().length;

            if (value === "C") {
                state.inputBuffer = "";
                inputDisplay.innerText = "";
                return;
            }

            if (state.inputBuffer.length < targetLength) {
                state.inputBuffer += value;
                inputDisplay.innerText = state.inputBuffer;
            }

            // Zero-friction instant processing when limit is fulfilled
            if (state.inputBuffer.length === targetLength) {
                state.inputLocked = true;
                evaluatePipeline();
            }
        }

        function evaluatePipeline() {
            const inputDisplay = document.getElementById('challenge-input');
            const feedbackDisplay = document.getElementById('challenge-feedback');
            const userInt = parseInt(state.inputBuffer);
            const absoluteValue = state.activeItem.ans;

            if (userInt === absoluteValue) {
                inputDisplay.classList.add('correct');
                state.streak++;
                document.getElementById('session-streak').innerText = `Streak: ${state.streak}`;
                
                setTimeout(() => {
                    serveChallenge();
                }, 350); // Fluid pacing lag compensation
            } else {
                inputDisplay.classList.add('incorrect');
                state.streak = 0;
                document.getElementById('session-streak').innerText = `Streak: ${state.streak}`;
                feedbackDisplay.innerText = `Correction: ${state.activeItem.x} × ${state.activeItem.y} = ${absoluteValue}`;
                
                // PEDAGOGICAL ERROR REPAIR:
                // Re-inject missed card 3 positions deep into upcoming queue for near-term recall re-testing
                const reinsertIndex = Math.min(3, state.currentPool.length);
                state.currentPool.splice(reinsertIndex, 0, state.activeItem);

                setTimeout(() => {
                    serveChallenge();
                }, 2000); // Intentionally prolonged delay for verification memory processing
            }
        }
    </script>
</body>
</html>
